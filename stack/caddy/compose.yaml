services:
  caddy:
    image: caddy/caddy:latest
    container_name: caddy
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ../../local-volumes/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../local-volumes/caddy/data:/data
      - ../../local-volumes/caddy/config:/config
    restart: unless-stopped
