services:
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    ports:
      - "${ANYTHINGLLM_PORT:-3001}:3001"
    cap_add:
      - SYS_ADMIN
    environment:
      # Adjust for your environment
      STORAGE_DIR: "/app/server/storage"
      JWT_SECRET: "8052bc60e76660a3cb1a664512dda74f9344cd3d610751ea3ffe31b8b5f34e4d"
      # LLM_PROVIDER: "ollama"
      OLLAMA_BASE_PATH: "${OLLAMA_BASE_URL}"
      OLLAMA_MODEL_PREF: "granite4.1:3b"
      OLLAMA_MODEL_TOKEN_LIMIT: "32768"
      # EMBEDDING_ENGINE: "ollama"
      # EMBEDDING_BASE_PATH: "${OLLAMA_BASE_URL}"
      # EMBEDDING_MODEL_PREF: "nomic-embed-text-v2-moe"
      # EMBEDDING_MODEL_MAX_CHUNK_LENGTH: "8192"
      LLM_PROVIDER: "litellm"
      LITE_LLM_MODEL_PREF: "gpt-5.4"
      LITE_LLM_MODEL_TOKEN_LIMIT: "32768"
      LITE_LLM_BASE_PATH: "${LITELLM_API_URL}"
      LITE_LLM_API_KEY: "${LITELLM_API_KEY}"
      EMBEDDING_ENGINE: "litellm"
      EMBEDDING_MODEL_PREF: "text-embedding-3-small"
      EMBEDDING_MODEL_MAX_CHUNK_LENGTH: 8191
      TTS_PROVIDER: "native"
      # TTS_PROVIDER: "generic-openai"
      # TTS_OPEN_AI_COMPATIBLE_KEY: "${LITELLM_API_KEY}"
      # TTS_OPEN_AI_COMPATIBLE_MODEL: "gpt-audio-1-5"
      # TTS_OPEN_AI_COMPATIBLE_VOICE_MODEL: "gpt-audio-1-5"
      # TTS_OPEN_AI_COMPATIBLE_ENDPOINT: "${LITELLM_API_URL}/v1"
      WHISPER_PROVIDER: "local"
      # VECTOR_DB: "lancedb"
      VECTOR_DB: "pgvector"
      PGVECTOR_CONNECTION_STRING: "postgresql://${ANYTHINGLLM_POSTGRES_USER}:${ANYTHINGLLM_POSTGRES_PASSWORD}@${POSTGRES_SHARED_HOST}:${POSTGRES_SHARED_PORT}/${ANYTHINGLLM_POSTGRES_DB}"
      AGENT_SEARXNG_API_URL: "${SEARXNG_BASE_URL}"
      PASSWORDMINCHAR: "10"
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
      ENABLED_TOOLS: "${ATLASSIAN_MCP_ENABLED_TOOLS}"
      DISABLE_TELEMETRY: "true"
      # Add any other keys here for services or settings
      # you can find in https://github.com/Mintplex-Labs/anything-llm/blob/master/docker/.env.example
    volumes:
      - ../../local-volumes/anythingllm/storage:/app/server/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2048M
