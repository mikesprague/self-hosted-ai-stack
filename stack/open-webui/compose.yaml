services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2048M
    depends_on:
      postgres-shared:
        condition: service_healthy
      bifrost:
        condition: service_healthy
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      DOCKER: "true"

      WEBUI_SECRET_KEY: "${OPEN_WEBUI_SECRET_KEY}"
      WEBUI_AUTH: "${OPEN_WEBUI_AUTH:-true}"
      WEBUI_ADMIN_EMAIL: "${OPEN_WEBUI_ADMIN_EMAIL:-}"
      WEBUI_ADMIN_PASSWORD: "${OPEN_WEBUI_ADMIN_PASSWORD:-}"
      WEBUI_ADMIN_NAME: "${OPEN_WEBUI_ADMIN_NAME:-}"

      ENABLE_SIGNUP: false
      ENABLE_DIRECT_CONNECTIONS: "true"
      ENABLE_CHANNELS: "true"
      ENABLE_EASTER_EGGS: "true"
      ENABLE_USER_STATUS: "false"
      ENABLE_PUBLIC_ACTIVE_USERS_COUNT: "false"
      ENABLE_BASE_MODELS_CACHE: "true"
      MODELS_CACHE_TTL: 300

      DATABASE_URL: "postgresql://${OPEN_WEBUI_POSTGRES_USER}:${OPEN_WEBUI_POSTGRES_PASSWORD}@postgres-shared:5432/${OPEN_WEBUI_POSTGRES_DB}"
      VECTOR_DB: "pgvector"
      PGVECTOR_DB_URL: "postgresql://${OPEN_WEBUI_POSTGRES_USER}:${OPEN_WEBUI_POSTGRES_PASSWORD}@postgres-shared:5432/${OPEN_WEBUI_POSTGRES_DB}"
      PGVECTOR_CREATE_EXTENSION: "true"
      UVICORN_WORKERS: 1

      ENABLE_OLLAMA_API: "true"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"

      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: "${BIFROST_OPENAI_API_URL}"
      OPENAI_API_KEY: "${BIFROST_API_KEY}"

      ENABLE_IMAGE_GENERATION: "true"
      ENABLE_IMAGE_PROMPT_GENERATION: "true"
      IMAGE_GENERATION_ENGINE: "openai"
      IMAGE_GENERATION_MODEL: "${OPEN_WEBUI_IMAGE_GENERATION_MODEL:-azure/gpt-image-1.5}"
      IMAGE_SIZE: "auto"
      ENABLE_IMAGE_EDIT: "true"
      IMAGE_EDIT_ENGINE: "openai"
      IMAGE_EDIT_MODEL: "${OPEN_WEBUI_IMAGE_EDIT_MODEL:-azure/gpt-image-1.5}"
      IMAGE_EDIT_SIZE: "auto"
      IMAGES_OPENAI_API_BASE_URL: "${BIFROST_OPENAI_IMAGES_API_URL}"
      IMAGES_OPENAI_API_KEY: "${BIFROST_API_KEY}"
      IMAGES_EDIT_OPENAI_API_BASE_URL: "${BIFROST_OPENAI_IMAGES_API_URL}"
      IMAGES_EDIT_OPENAI_API_KEY: "${BIFROST_API_KEY}"

      ENABLE_WEB_SEARCH: "true"
      ENABLE_SEARCH_QUERY_GENERATION: "true"
      WEB_SEARCH_RESULT_COUNT: 8
      WEB_SEARCH_CONCURRENT_REQUESTS: 4
      WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_QUERY_URL: "${SEARXNG_BASE_URL}/search?q=<query>"

      TOOL_SERVER_CONNECTIONS: >-
        [
          {
            "type": "mcp",
            "url": "http://atlassian-mcp:${ATLASSIAN_MCP_PORT}/mcp",
            "spec_type": "url",
            "spec": "",
            "path": "",
            "auth_type": "none",
            "key": "",
            "headers": {},
            "config": {
              "enable": true
            },
            "info": {
              "id": "atlassian",
              "name": "Atlassian MCP",
              "description": "Readonly Jira and Confluence tools for accessing data in our instances"
            }
          },
          {
            "type": "mcp",
            "url": "${TDX_MCP_SERVER_URL}",
            "spec_type": "url",
            "spec": "",
            "path": "",
            "auth_type": "none",
            "key": "",
            "headers": {},
            "config": {
              "enable": true
            },
            "info": {
              "id": "tdx",
              "name": "TDX MCP",
              "description": "Full-text search tools with access to TDX tickets and KB articles"
            }
          },
          {
            "type": "mcp",
            "url": "https://mcp.context7.com/mcp",
            "spec_type": "url",
            "spec": "",
            "path": "",
            "auth_type": "none",
            "key": "",
            "headers": {
              "CONTEXT7_API_KEY": "${CONTEXT7_API_KEY}"
            },
            "config": {
              "enable": true
            },
            "info": {
              "id": "context7",
              "name": "Context7 MCP",
              "description": "Pull up-to-date version-specific llm-friendly documentation and code examples for any library"
            }
          },
          {
            "type": "mcp",
            "url": "https://mcp.mermaid.ai/mcp",
            "spec_type": "url",
            "spec": "",
            "path": "",
            "auth_type": "none",
            "key": "",
            "headers": {},
            "config": {
              "enable": true
            },
            "info": {
              "id": "mermaid",
              "name": "Mermaid MCP",
              "description": "Enables AI assistants to create, validate, and render Mermaid diagrams"
            }
          }
        ]

      # default suggestions shown in chat UI, modify or remove as you see fit
      DEFAULT_PROMPT_SUGGESTIONS: >-
        [
          {
            "title": [ "Help me study", "vocabulary for a college entrance exam" ],
            "content": "Help me study vocabulary: write a sentence for me to fill in the blank, and I'll try to pick the correct option."
          },
          {
            "title": [ "Give me ideas", "for what to do with my kids' art" ],
            "content": "What are 5 creative things I could do with my kids' art? I don't want to throw them away, but it's also so much clutter."
          },
          {
            "title": [ "Tell me a fun fact", "about the Roman Empire" ],
            "content": "Tell me a random fun fact about the Roman Empire"
          },
          {
            "title": [ "Show me a code snippet", "of a website's sticky header" ],
            "content": "Show me a code snippet of a website's sticky header in CSS and JavaScript."
          },
          {
            "title": [ "Explain options trading", "if I'm familiar with buying and selling stocks" ],
            "content": "Explain options trading in simple terms if I'm familiar with buying and selling stocks."
          },
          {
            "title": [ "Overcome procrastination", "give me tips" ],
            "content": "Could you start by asking me about instances when I procrastinate the most and then give me some suggestions to overcome it?"
          }
        ]

    volumes:
      - ../../local-volumes/open-webui/data:/app/backend/data:rw
