services:
  activepieces:
    image: ghcr.io/activepieces/activepieces:0.83.0
    container_name: activepieces
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6144M
    ports:
      - "${ACTIVEPIECES_PORT:-8080}:80"
    environment:
      # Encryption key (REQUIRED — 32 hex characters)
      # Generate with: openssl rand -hex 16
      AP_ENCRYPTION_KEY: ${ACTIVEPIECES_ENCRYPTION_KEY}
      # JWT secret (REQUIRED)
      # Generate with: openssl rand -hex 32
      AP_JWT_SECRET: ${ACTIVEPIECES_JWT_SECRET}
      # Frontend URL (set to your public URL)
      AP_FRONTEND_URL: "http://${TAILNET_IP_ADDRESS:-localhost}:${ACTIVEPIECES_PORT:-8080}"
      # PostgreSQL connection
      AP_POSTGRES_DATABASE: "${ACTIVEPIECES_POSTGRES_DATABASE}"
      AP_POSTGRES_HOST: "${POSTGRES_SHARED_HOST}"
      AP_POSTGRES_PORT: "${POSTGRES_SHARED_PORT}"
      AP_POSTGRES_USERNAME: "${ACTIVEPIECES_POSTGRES_USERNAME}"
      AP_POSTGRES_PASSWORD: ${ACTIVEPIECES_POSTGRES_PASSWORD}
      # Redis connection
      AP_REDIS_HOST: "activepieces-redis"
      AP_REDIS_PORT: "6379"
      # SMTP Settings
      AP_SMTP_HOST: "${MAILPIT_SMTP_HOST}"
      AP_SMTP_PORT: "${MAILPIT_SMTP_PORT}"
      AP_SMTP_USER: "${MAILPIT_SMTP_USER}"
      AP_SMTP_PASSWORD: "${MAILPIT_SMTP_PASSWORD}"
      AP_SMTP_SENDER_EMAIL: "${ACTIVEPIECES_SMTP_SENDER_EMAIL}"
      # Execution settings
      AP_EXECUTION_MODE: "UNSANDBOXED"
      AP_ENVIRONMENT: "prod"
      # Telemetry (disable if desired)
      AP_TELEMETRY_ENABLED: "false"
      AP_TEMPLATES_SOURCE_URL: "https://cloud.activepieces.com/api/v1/flow-templates"
      # Polling interval (seconds)
      AP_TRIGGER_DEFAULT_POLL_INTERVAL: 5
      # Webhook timeout
      AP_WEBHOOK_TIMEOUT_SECONDS: 30
      # Flow execution timeout
      AP_FLOW_TIMEOUT_SECONDS: 600
    depends_on:
      postgres-shared:
        condition: service_healthy
      activepieces-redis:
        condition: service_healthy
    volumes:
      - ../../local-volumes/activepieces/cache:/usr/src/app/cache

  activepieces-redis:
    image: redis:8-alpine
    container_name: activepieces-redis
    command:
      - redis-server
      - --maxmemory 225mb # a bit under container limit so you leave room for Redis overhead
      - --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../../local-volumes/activepieces/redis:/data
    restart: unless-stopped
